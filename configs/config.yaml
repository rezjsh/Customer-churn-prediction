data_ingestion:
  root_dir: data/raw
  source_type: file
  file_path: data/raw/Telco-Customer-Churn.csv
  file_type: csv

data_eda:
  root_dir: artifacts/data_eda
  data_path: data/raw/Telco-Customer-Churn.csv
  json_report_path: artifacts/data_eda/eda_report.json
  text_report_path: artifacts/data_eda/eda_report.txt

data_validation:
  root_dir: artifacts/data_validation
  unzip_data_dir: data/raw/Telco-Customer-Churn.csv # Path to the output of ingestion/EDA
  STATUS_FILE: artifacts/data_validation/status.txt

data_transformation:
  root_dir: data/processed
  train_file_name: X_train.csv
  test_file_name: X_test.csv

model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: data/processed/X_train.csv # Combined processed files or features
  model_dir: artifacts/models

model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: data/processed/X_test.csv
  model_dir: artifacts/models
  metric_file_name: artifacts/model_evaluation/metrics.json
